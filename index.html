<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeRacer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400..900;1,400..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header Section -->
    <header class="header-section py-4 border-bottom">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="app-title mb-0">TypeRacer</h1>
                <button class="btn btn-instructions" id="instructionsBtn">
                    <i class="fas fa-question-circle"></i> Instructions
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Section -->
    <main class="main-content py-5">
        <div class="container-fluid">
            <div class="row g-4">
                <!-- Test Area Column (2/3 width on medium+ screens) -->
                <div class="col-12 col-md-8">
                    <!-- Difficulty Dropdown -->
                    <div class="difficulty-section mb-4">
                        <div class="input-group">
                            <label class="input-group-text" for="difficultySelect">Select Difficulty</label>
                            <select class="form-select" id="difficultySelect">
                                <option selected>Easy</option>
                                <option>Medium</option>
                                <option>Hard</option>
                            </select>
                        </div>
                    </div>

                    <!-- Sample Text Section -->
                    <div class="sample-text-section mb-4">
                        <div class="sample-text-box p-4 rounded">
                            <p id="sampleText" class="sample-text mb-0">
                                The quick brown fox jumps over the lazy dog. This is a typing speed test application designed to help you improve your typing skills. Focus on accuracy first, then speed will follow naturally.
                            </p>
                        </div>
                    </div>

                    <!-- User Input Section -->
                    <div class="user-input-section mb-4">
                        <textarea class="form-control" id="userInput" rows="4" placeholder="Click here and start typing..."></textarea>
                    </div>

                    <!-- Control Buttons -->
                    <div class="controls-section d-flex gap-3">
                        <button class="btn btn-primary" id="startBtn">
                            <i class="fas fa-play"></i> Start
                        </button>
                        <button class="btn btn-danger" id="stopBtn">
                            <i class="fas fa-stop"></i> Stop
                        </button>
                        <button class="btn btn-warning" id="retryBtn">
                            <i class="fas fa-redo"></i> Retry
                        </button>
                    </div>
                </div>

                <!-- Results Area Column (1/3 width on medium+ screens) -->
                <div class="col-12 col-md-4">
                    <div class="results-section">
                        <div class="results-card p-4 rounded">
                            <h2 class="results-title mb-4">Results</h2>
                            
                            <div class="result-item mb-3">
                                <h3 class="result-label">Level</h3>
                                <p class="result-value"><span id="levelDisplay">-</span></p>
                            </div>

                            <div class="result-item mb-3">
                                <h3 class="result-label">Time</h3>
                                <p class="result-value"><span id="timeDisplay">0</span>s</p>
                            </div>

                            <div class="result-item mb-3">
                                <h3 class="result-label">WPM</h3>
                                <p class="result-value"><span id="wpmDisplay">0</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.min.js"></script>
    <script src="https://kit.fontawesome.com/YOUR-KIT-CODE-HERE.js" crossorigin="anonymous"></script>
</body>
</html>
