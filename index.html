<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeRacer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400..900;1,400..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header Section -->
    <header class="header-section">
        <div class="header-content">
            <h1 class="app-title">TypeRacer</h1>
            <button class="btn btn-instructions" id="instructionsBtn">
                Instructions
            </button>
        </div>
    </header>

    <!-- Main Content Section -->
    <main class="main-content">
        <div class="container">
            <div class="row g-4">
                <!-- Test Area Column -->
                <div class="col-12 col-lg-8">
                    <!-- Difficulty Dropdown -->
                    <div class="difficulty-section mb-4">
                        <div class="input-group">
                            <label class="input-group-text" for="difficultySelect">Select Difficulty</label>
                            <select class="form-select" id="difficultySelect">
                                <option selected>Easy</option>
                                <option>Medium</option>
                                <option>Hard</option>
                            </select>
                        </div>
                    </div>

                    <!-- Instructions Text -->
                    <p class="instructions-text">Test your typing speed by typing the text shown below:</p>

                    <!-- Sample Text Section -->
                    <div class="sample-text-section mb-4">
                        <div class="sample-text-box">
                            <p id="sampleText" class="sample-text">
                                The cat sat on the mat.
                            </p>
                        </div>
                    </div>

                    <!-- User Input Section -->
                    <div class="user-input-section mb-4">
                        <textarea class="form-control" id="userInput" rows="6" placeholder="Click the start button to begin the test"></textarea>
                    </div>

                    <!-- Control Buttons -->
                    <div class="controls-section d-flex justify-content-center gap-3">
                        <button class="btn btn-outline-orange" id="startBtn">
                            Start
                        </button>
                        <button class="btn btn-outline-orange" id="stopBtn">
                            Stop
                        </button>
                        <button class="btn btn-outline-orange" id="retryBtn">
                            Retry
                        </button>
                    </div>
                </div>

                <!-- Results Area Column -->
                <div class="col-12 col-lg-4">
                    <div class="results-section">
                        <div class="results-card">
                            <h2 class="results-title">Results</h2>
                            
                            <div class="result-item">
                                <p class="result-label">Level: <span id="levelDisplay">Easy</span></p>
                            </div>

                            <div class="result-item">
                                <p class="result-label">Time: <span id="timeDisplay">0</span>s</p>
                            </div>

                            <div class="result-item">
                                <p class="result-label">WPM: <span id="wpmDisplay">0</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.min.js"></script>
    <script src="https://kit.fontawesome.com/YOUR-KIT-CODE-HERE.js" crossorigin="anonymous"></script>
</body>
</html>
